name: material_weibo
description: "MaterialWeibo - 轻量级微博第三方客户端"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # UI & Material Design
  dynamic_color: ^1.7.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  photo_view: ^0.15.0
  flutter_svg: ^2.0.10

  # 状态管理
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # 网络
  dio: ^5.7.0
  connectivity_plus: ^6.1.4

  # 本地存储
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # 路由
  go_router: ^14.8.1

  # 认证
  webview_flutter: ^4.12.0

  # 工具
  get_it: ^8.0.3
  intl: ^0.20.2
  html: ^0.15.5
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  json_annotation: ^4.9.0
  freezed_annotation: ^3.0.0
  timeago: ^3.7.0
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_android_video: ^1.3.6

hooks:
  user_defines:
    sqlite3:
      source: system

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.4
  freezed: ^3.0.6
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#E6162D"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
